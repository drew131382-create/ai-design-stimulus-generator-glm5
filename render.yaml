services:
  - type: web
    name: ai-design-stimulus-server
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MODELSCOPE_API_KEY
        sync: false
      - key: MODELSCOPE_BASE_URL
        sync: false
      - key: MODELSCOPE_MODEL
        value: ZhipuAI/GLM-5
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: 10000
