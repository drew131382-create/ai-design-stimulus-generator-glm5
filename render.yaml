services:
  - type: web
    name: ai-design-stimulus-frontend
    runtime: static
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false

  - type: web
    name: ai-design-stimulus-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_EMBEDDING_API_KEY
        sync: false
      - key: ZHIPU_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: ZHIPU_CHAT_MODEL
        value: glm-5
      - key: ZHIPU_EMBEDDING_MODEL
        value: embedding-3
      - key: REDIS_URL
        sync: false
      - key: START_EMBEDDED_WORKER
        value: "true"
      - key: JOB_QUEUE_NAME
        value: generate-stimuli
      - key: JOB_WORKER_CONCURRENCY
        value: 3
      - key: JOB_QUEUE_MAX_SIZE
        value: 30
      - key: JOB_RESULT_TTL_MS
        value: 3600000
      - key: JOB_ESTIMATED_DURATION_SECONDS
        value: 150
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: 10000

  - type: worker
    name: ai-design-stimulus-worker
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:worker
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_EMBEDDING_API_KEY
        sync: false
      - key: ZHIPU_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: ZHIPU_CHAT_MODEL
        value: glm-5
      - key: ZHIPU_EMBEDDING_MODEL
        value: embedding-3
      - key: REDIS_URL
        sync: false
      - key: START_EMBEDDED_WORKER
        value: "false"
      - key: JOB_QUEUE_NAME
        value: generate-stimuli
      - key: JOB_WORKER_CONCURRENCY
        value: 3
      - key: JOB_QUEUE_MAX_SIZE
        value: 30
      - key: JOB_RESULT_TTL_MS
        value: 3600000
      - key: JOB_ESTIMATED_DURATION_SECONDS
        value: 150
