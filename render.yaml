services:
  - type: web
    name: ai-design-stimulus-frontend
    env: static
    rootDir: client
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false

  - type: web
    name: ai-design-stimulus-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MODELSCOPE_API_KEY
        sync: false
      - key: MODELSCOPE_BASE_URL
        value: https://api-inference.modelscope.cn/v1
      - key: MODELSCOPE_MODEL
        value: ZhipuAI/GLM-5
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPU_BASE_URL
        value: https://open.bigmodel.cn/api/paas/v4
      - key: ZHIPU_EMBEDDING_MODEL
        value: embedding-3
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: 10000
